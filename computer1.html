<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Science Engineering | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;font-family:'Poppins',sans-serif;background:linear-gradient(160deg,#fff 0%,#eff6ff 48%,#fff 100%);color:#0f172a;display:flex;align-items:center;justify-content:center;padding:24px;overflow-x:hidden}
        .page{width:100%;max-width:760px;text-align:center;position:relative}
        .brand{display:inline-flex;align-items:center;gap:12px;background:#fff;border:1px solid #dbeafe;border-radius:16px;padding:10px 14px;margin-bottom:26px;box-shadow:0 10px 30px rgba(37,99,235,.08)}
        .brand-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#2563eb,#0891b2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900}
        .brand-text{text-align:left}
        .brand-text strong{display:block;font-size:13px;line-height:1.2}
        .brand-text span{display:block;font-size:10px;color:#64748b;letter-spacing:1px;text-transform:uppercase}
        .card{background:rgba(255,255,255,.92);border:1px solid #dbeafe;border-radius:26px;padding:52px 42px;box-shadow:0 24px 80px rgba(15,23,42,.10);position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:-90px;right:-90px;width:220px;height:220px;border-radius:50%;background:rgba(37,99,235,.10)}
        .icon{font-size:62px;margin-bottom:18px}
        .badge{display:inline-flex;align-items:center;gap:8px;padding:7px 16px;border-radius:999px;background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:18px}
        .dot{width:8px;height:8px;border-radius:50%;background:#2563eb}
        h1{font-size:42px;line-height:1.12;font-weight:900;margin-bottom:14px;color:#0f172a}
        h1 span{color:#2563eb}
        p{font-size:16px;color:#64748b;line-height:1.75;max-width:560px;margin:0 auto 30px}
        .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
        a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:12px 22px;border-radius:13px;text-decoration:none;font-weight:700;font-size:14px}
        .primary{background:linear-gradient(135deg,#2563eb,#0891b2);color:#fff;box-shadow:0 12px 30px rgba(37,99,235,.24)}
        @media(max-width:520px){
            body{padding:16px;align-items:flex-start;padding-top:56px}
            .brand{margin-bottom:18px}
            .card{padding:36px 20px;border-radius:22px}
            .icon{font-size:52px}
            h1{font-size:31px}
            p{font-size:14px}
            .actions{display:grid;grid-template-columns:1fr}
            a{width:100%}
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="brand">
            <div class="brand-icon">CS</div>
            <div class="brand-text">
                <strong>Computer Science Engineering</strong>
                <span>Chandigarh University</span>
            </div>
        </div>
        <section class="card">
            <div class="icon">💻</div>
            <div class="badge"><span class="dot"></span> Coming Soon</div>
            <h1>Computer Science Page <span>Coming Soon</span></h1>
            <p>This department page is being prepared. Labs, faculty, placements and resources will be available here soon.</p>
            <div class="actions">
                <a class="primary" href="demo.html">Back to Departments</a>
            </div>
        </section>
    </main>
</body>
</html>
